<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <meta name="description" content="Credo ut intelligam.">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Site.Title }}">
  <meta property="og:description" content="Credo ut intelligam.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Site.BaseURL }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Site.Title }}">
  <meta name="twitter:description" content="Credo ut intelligam.">
  <meta name="twitter:image" content="{{ .Site.BaseURL }}og-image.png">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Font preloads -->
  <link rel="preload" href="/fonts/Jost.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/AtkinsonHyperlegibleNext-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/IntelOneMono-Regular.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="page">
    <h1 class="heading wordmark"><a href="/">N8K</a></h1>
    <p class="motto">Credo ut intelligam.</p>

    <div class="bio">
      {{ .Content }}
    </div>

    <nav>
      <ul class="links">
        <li><a href="https://github.com/heyn8k">GitHub</a></li>
        <li><a href="https://x.com/heyn8k">X</a></li>
        <li><a href="https://glassdarkly.dev">glassdarkly.dev</a></li>
      </ul>
    </nav>

    <footer class="footer">
      <a href="/" class="footer-mark" aria-label="Home">
        <img src="/favicon.svg" alt="" width="32" height="48">
      </a>
    </footer>
  </main>
</body>
</html>
