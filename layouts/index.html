<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta name="author" content="{{ .Site.Params.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ .Site.Title }}">
  <meta property="og:description" content="{{ .Site.Params.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Site.BaseURL }}">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- Font preloads -->
  <link rel="preload" href="/fonts/MontserratAlternates-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/AtkinsonHyperlegibleNext-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/IntelOneMono-Regular.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="page">
    <h1 class="heading">N8K</h1>

    <div class="bio">
      {{ .Content }}
    </div>

    <nav>
      <ul class="links">
        <li><a href="https://glassdarkly.dev">glassdarkly.dev</a></li>
        <li><a href="https://github.com/heyn8k">GitHub</a></li>
        <li><a href="https://x.com/heyn8k">X</a></li>
      </ul>
    </nav>

    <hr class="rule">
  </main>
</body>
</html>
